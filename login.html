<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up | StudentGrade Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <header>
            <h1>StudentGrade Pro</h1>
            <p>Join the community of high achievers.</p>
        </header>

        <main class="auth-card">
            <!-- Login Form -->
            <form id="login-form">
                <h2>Login</h2>
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn-primary">Login</button>
                <p>New here? <a href="#" id="show-signup">Create an account</a></p>
            </form>

            <!-- Signup Form (Hidden by default) -->
            <form id="signup-form" class="hidden">
                <h2>Sign Up</h2>
                <input type="text" id="signup-name" placeholder="Full Name" required>
                
                <!-- Role Selection with Attractive Cards -->
                <div class="role-selector">
                    <label class="role-card">
                        <input type="radio" name="signup-role" value="teacher" class="role-input" required>
                        <div class="role-card-content">
                            <div class="role-icon">👨‍🏫</div>
                            <div class="role-title">Teacher</div>
                            <div class="role-desc">Teach and grade students</div>
                        </div>
                    </label>

                    <label class="role-card">
                        <input type="radio" name="signup-role" value="admin" class="role-input" required>
                        <div class="role-card-content">
                            <div class="role-icon">👨‍💼</div>
                            <div class="role-title">Admin</div>
                            <div class="role-desc">Manage entire system</div>
                        </div>
                    </label>
                </div>

                <select id="signup-class" style="display:none;">
                    <option value="">-- Select Your Class --</option>
                    <option value="Grade 1A">Grade 1A</option>
                    <option value="Grade 1B">Grade 1B</option>
                    <option value="Grade 2A">Grade 2A</option>
                    <option value="Grade 2B">Grade 2B</option>
                    <option value="Grade 3A">Grade 3A</option>
                    <option value="Grade 3B">Grade 3B</option>
                    <option value="Grade 4A">Grade 4A</option>
                    <option value="Grade 4B">Grade 4B</option>
                    <option value="Grade 5A">Grade 5A</option>
                    <option value="Grade 5B">Grade 5B</option>
                    <option value="Grade 6A">Grade 6A</option>
                    <option value="Grade 6B">Grade 6B</option>
                    <option value="Grade 7A">Grade 7A</option>
                    <option value="Grade 7B">Grade 7B</option>
                    <option value="Grade 8A">Grade 8A</option>
                    <option value="Grade 8B">Grade 8B</option>
                </select>

                <input type="text" id="signup-school" placeholder="School Name" style="display:none;">
                <input type="email" id="signup-email" placeholder="Email" required>
                <input type="password" id="signup-password" placeholder="Password (min 6 characters)" required>
                <button type="submit" class="btn-primary">Register</button>
                <p>Already have an account? <a href="#" id="show-login">Login</a></p>
            </form>
        </main>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
